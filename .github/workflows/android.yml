name: CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shadow Injection (Elite API Key)
        run: |
          sed -i "s/ELITE_GOOGLE_API_KEY_PLACEHOLDER/${{ secrets.ELITE_GOOGLE_KEY }}/g" innertube/src/main/kotlin/com/peecock/innertube/models/Context.kt
      - name: set up JDK 18
        uses: actions/setup-java@v4
        with:
          java-version: "18"
          distribution: "temurin"
          cache: gradle
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/*.apk
